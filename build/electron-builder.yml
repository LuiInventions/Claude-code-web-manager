appId: com.luis.claudecontrolcenter
productName: Claude Code Control Center
directories:
  output: build/dist
  buildResources: build/resources
files:
  - build/electron/**/*.js
  - build/electron/dist/**/*
  - .next/**/*
  - next.config.ts
  - package.json
  - node_modules/**/*
asarUnpack:
  - node_modules/node-pty/**/*
  - .next/**/*
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
