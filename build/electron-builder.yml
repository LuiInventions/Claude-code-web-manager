appId: com.luis.claudecontrolcenter
productName: Claude Code Control Center
# Publisher identity written into the executable + installer version info. The
# Windows "Unknown publisher" (SmartScreen / UAC) warning only disappears once
# the build is signed with a certificate issued by a real Certificate Authority
# — see build/SIGNING.md. Signing is OPT-IN via env vars (CSC_LINK +
# CSC_KEY_PASSWORD, or a win.azureSignOptions block); with none set,
# electron-builder produces an UNSIGNED build carrying this metadata only.
copyright: © 2026 LT Digital Concepts (Luis Kleemann)
# node-pty ships runtime-agnostic N-API prebuilds (prebuilds/win32-x64), so no
# native rebuild against Electron's ABI is needed — skip it to avoid requiring a
# C++ toolchain. The prebuilt .node files are asarUnpacked below.
npmRebuild: false
# Keep the app unpacked on disk (no asar) so the custom Next server can read
# `.next`/`next.config.mjs` and node-pty can load its prebuilt .node files via
# plain filesystem paths.
asar: false
directories:
  output: build/dist
  buildResources: build/resources
files:
  - build/electron/**/*.js
  - build/electron/dist/**/*
  - build/resources/**/*
  - .next/**/*
  - next.config.mjs
  - package.json
  - node_modules/**/*
win:
  icon: build/resources/icon.ico
  # electron-builder v26 nests signing options under `signtoolOptions`. The
  # publisher name matches the certificate subject once signing is enabled
  # (CSC_LINK + CSC_KEY_PASSWORD env, or an `azureSignOptions` block). With no
  # certificate present the build is unsigned but keeps this publisher metadata.
  # See build/SIGNING.md.
  signtoolOptions:
    publisherName: LT Digital Concepts
  # Only the NSIS installer is shipped — no standalone portable .exe.
  target:
    - nsis
nsis:
  oneClick: false
  # Per-user install (default LOCALAPPDATA\Programs\...) so the app dir stays
  # writable — the Next server and node-pty need to write there at runtime, and
  # it keeps installs from requiring admin rights.
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/resources/icon.ico
  uninstallerIcon: build/resources/icon.ico
  installerHeaderIcon: build/resources/icon.ico
  shortcutName: Claude Code Control Center
  # Downloadable installer file name: cc-control-center-Setup-<version>.exe
  artifactName: cc-control-center-Setup-${version}.${ext}
